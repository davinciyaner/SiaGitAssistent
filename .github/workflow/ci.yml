name: DevOpsAgent CI

on:
  push:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install Dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install flake8

      - name: Format Check
          run: |
          pip install black
          black --check backend

      - name: Lint Code
        run: |
          flake8 backend

      - name: Format Check
        run: |
          pip install black
          black --check backend

      - name: Run Tests
        run: |
          pytest backend || true